name: CI Upstream
on:
  push:
  workflow_dispatch:
  schedule:
     - cron: '0 0 * * *' # Daily “At 00:00”

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upstream-dev:
    name:  upstream-dev
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    outputs:
      testresults: ${{ steps.tests.outcome }}

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: set up environment
        id: env-setup
        continue-on-error: true
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-file: build_envs/environment.yml
          create-args: >-
            python=${{ matrix.python-version }}

      - name: conda list
        run: |
          conda list

      - name: Install upstream versions
        run: |
          bash ci/install-upstream.sh

      - name: Install geocat-viz
        run: |
          python -m pip install . --no-deps

      - name: conda list
        run: |
          conda list

      - name: tests
        id: tests       
        run: |
          python -m pytest

  failure-issue:
    name: failure-issue
    needs: upstream-dev
    if: |
      (needs.upstream--dev.outputs.testresults != 'success')
      && github.repository == 'NCAR/geocat-viz'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create or update failure issue
        shell: bash
        run: |
          # Read the template
          template=$(cat .github/upstream-failure-issue-template.md)

          # Replace placeholders
          issue_body="${template//\{\{WORKFLOW\}\}/${{ github.workflow }}}"
          issue_body="${issue_body//\{\{RUN_ID\}\}/${{ github.run_id }}}"
          issue_body="${issue_body//\{\{RUN_URL\}\}/${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"
          issue_body="${issue_body//\{\{DATE\}\}/$(date -u)}"

          # Check for existing open issue with same title
          issue_title="🤖 Upstream testing failure"
          existing_issue=$(gh issue list --state open --label "testing" --search "\"$issue_title\" in:title" --json number --jq '.[0].number // empty')

          if [ -n "$existing_issue" ]; then
            echo "Found existing open issue #$existing_issue, updating it..."
            echo "$issue_body" | gh issue edit "$existing_issue" --body-file -
            echo "Updated existing issue #$existing_issue"
          else
            echo "No existing open issue found, creating new one..."
            echo "$issue_body" | gh issue create \
              --title "$issue_title" \
              --body-file - \
              --label "testing"
            echo "Created new issue"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  report-failed:
    name: report-failed
    needs: [upstream-dev, failure-issue]
    if: ${{needs.upstream-dev.outputs.testresults != 'success'}}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: make sure to report a failed workflow
        shell: bash
        run: |
          exit 1;